<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>termsnap playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #f0f6fc;
      margin-bottom: 8px;
    }

    header h1 span {
      color: #58a6ff;
    }

    header p {
      color: #8b949e;
      font-size: 1.05rem;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls label {
      font-size: 0.85rem;
      color: #8b949e;
    }

    .controls select, .controls button, .controls input[type="file"] {
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .controls select:hover, .controls button:hover {
      border-color: #58a6ff;
    }

    .btn-primary {
      background: #238636 !important;
      border-color: #238636 !important;
      color: #fff !important;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #2ea043 !important;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .workspace { grid-template-columns: 1fr; }
    }

    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }

    .panel-header {
      padding: 10px 16px;
      background: #1c2129;
      border-bottom: 1px solid #30363d;
      font-size: 0.85rem;
      font-weight: 600;
      color: #8b949e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header .badge {
      background: #30363d;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 400;
    }

    textarea {
      width: 100%;
      height: 400px;
      background: #0d1117;
      color: #c9d1d9;
      border: none;
      padding: 16px;
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.5;
      resize: vertical;
      outline: none;
    }

    textarea::placeholder {
      color: #484f58;
    }

    .preview {
      padding: 20px;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }

    .preview svg {
      max-width: 100%;
      height: auto;
    }

    .preview .placeholder {
      color: #484f58;
      font-size: 0.95rem;
      text-align: center;
    }

    .drop-zone {
      border: 2px dashed #30363d;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      margin-bottom: 20px;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }

    .drop-zone.active {
      border-color: #58a6ff;
      background: rgba(88, 166, 255, 0.05);
    }

    .drop-zone p {
      color: #8b949e;
      margin-bottom: 8px;
    }

    .drop-zone .hint {
      font-size: 0.8rem;
      color: #484f58;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #21262d;
      color: #484f58;
      font-size: 0.85rem;
    }

    footer a {
      color: #58a6ff;
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span>termsnap</span> playground</h1>
      <p>Paste or drop a .cast file and preview the animated SVG instantly</p>
    </header>

    <div class="drop-zone" id="dropZone">
      <p>Drop a <strong>.cast</strong> file here</p>
      <p class="hint">or click to browse &middot; or paste asciicast content below</p>
      <input type="file" id="fileInput" accept=".cast,.json,.txt" style="display:none">
    </div>

    <div class="controls">
      <label>Theme:</label>
      <select id="themeSelect"></select>

      <label>Font size:</label>
      <select id="fontSizeSelect">
        <option value="12">12px</option>
        <option value="13">13px</option>
        <option value="14" selected>14px</option>
        <option value="16">16px</option>
        <option value="18">18px</option>
      </select>

      <label>
        <input type="checkbox" id="windowChrome" checked> Window chrome
      </label>

      <div style="flex:1"></div>

      <button class="btn-primary" id="downloadBtn" disabled>Download SVG</button>
    </div>

    <div class="workspace">
      <div class="panel">
        <div class="panel-header">
          Input <span class="badge" id="eventCount">0 events</span>
        </div>
        <textarea id="castInput" placeholder='Paste asciicast v2 content here...

Example format:
{"version":2,"width":80,"height":24,"timestamp":1234567890}
[0.5,"o","$ hello world\r\n"]
[1.0,"o","$ ls\r\n"]'></textarea>
      </div>
      <div class="panel">
        <div class="panel-header">
          Preview <span class="badge" id="svgSize">-</span>
        </div>
        <div class="preview" id="preview">
          <div class="placeholder">SVG preview will appear here</div>
        </div>
      </div>
    </div>

    <footer>
      <a href="https://github.com/CuteAnimeGirl1337/termsnap">termsnap</a> &mdash; record terminals, export animated SVGs
    </footer>
  </div>

  <script type="module" src="./app.ts"></script>
</body>
</html>
